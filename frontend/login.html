<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — JobFinder</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .auth-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 16px; }
    .auth-card { width: 100%; max-width: 380px; }
    .auth-logo { display: flex; align-items: center; gap: 8px; justify-content: center; font-size: 18px; font-weight: 700; margin-bottom: 24px; }
    .auth-logo span { color: var(--accent-h); }
    .auth-divider { display: flex; align-items: center; gap: 10px; margin: 16px 0; color: var(--muted); font-size: 12px; }
    .auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .btn-google { width: 100%; background: #fff; color: #1f1f1f; border-color: #fff; }
    .btn-google:hover { background: #f1f1f1; }
    .auth-footer { text-align: center; margin-top: 16px; font-size: 13px; color: var(--muted); }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Job<span>Finder</span>
    </div>

    <div class="card">
      <h2 style="font-size:16px;font-weight:600;margin-bottom:16px">Log in</h2>
      <div id="msg"></div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input id="email" class="input" type="email" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input id="password" class="input" type="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary w-full" id="submit-btn">Log in</button>
      </form>

      <div id="google-section" class="hidden">
        <div class="auth-divider">OR</div>
        <a href="/api/auth/google" class="btn btn-google">
          <svg width="16" height="16" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5h-1.9V20.5H24v7h11.3c-1.6 4.6-6 7.9-11.3 7.9-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20s20-8.9 20-20c0-1.2-.1-2.4-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l5.8 4.3C13.8 15.2 18.5 12 24 12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.5 6 29.5 4 24 4c-7.4 0-13.7 4.1-17.1 10.1z"/><path fill="#4CAF50" d="M24 44c5.4 0 10.3-1.9 14.1-5.1l-6.5-5.5C29.5 35.1 26.9 36 24 36c-5.3 0-9.7-3.3-11.3-7.9l-5.9 4.5C10.3 39.9 16.6 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H24v7h11.3c-.8 2.3-2.2 4.2-4.1 5.5l6.5 5.5C40.5 36 44 30.5 44 24c0-1.2-.1-2.4-.4-3.5z"/></svg>
          Sign in with Google
        </a>
      </div>
    </div>

    <div class="auth-footer">Don't have an account? <a href="/signup.html">Sign up</a></div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
api.googleEnabled().then(d => { if (d.enabled) qs('#google-section').classList.remove('hidden'); }).catch(() => {});

qs('#login-form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = qs('#submit-btn');
  btn.disabled = true; btn.textContent = 'Logging in…';
  try {
    await api.login(qs('#email').value.trim(), qs('#password').value);
    window.location.href = '/';
  } catch (err) {
    showAlert(qs('#msg'), 'error', err.message);
    btn.disabled = false; btn.textContent = 'Log in';
  }
});

if (urlParam('error') === 'google_failed') {
  showAlert(qs('#msg'), 'error', 'Google sign-in failed. Please try again or use email/password.');
}
</script>
</body>
</html>
